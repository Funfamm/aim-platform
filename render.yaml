services:
  - type: web
    name: aim-platform
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build:prod
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: 1
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        value: https://impactaistudio.com
