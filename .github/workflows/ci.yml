name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Use Node.js 24 runtime for GitHub Actions to avoid Node 20 deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Run ESLint (baseline-aware)
        run: npm run lint:ci
      - name: Run security audit (informational)
        run: npm audit --production --audit-level=high || true

  typecheck:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: TypeScript check
        run: npx tsc --noEmit

  unit:
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npx vitest run

  integration:
    runs-on: ubuntu-latest
    needs: unit
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U test -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          DIRECT_URL: postgresql://test:test@localhost:5432/testdb
        run: npx prisma generate
      - name: Push schema to CI database
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          DIRECT_URL: postgresql://test:test@localhost:5432/testdb
        run: npx prisma db push --force-reset --accept-data-loss
      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          DIRECT_URL: postgresql://test:test@localhost:5432/testdb
        run: npm run test:integration

  e2e:
    runs-on: ubuntu-latest
    needs: integration
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U test -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          DIRECT_URL: postgresql://test:test@localhost:5432/testdb
        run: npx prisma generate
      - name: Push schema to CI database
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          DIRECT_URL: postgresql://test:test@localhost:5432/testdb
        run: |
          npx prisma migrate reset --force --skip-seed
          echo "✅ Schema push complete"
      - name: Build production app
        timeout-minutes: 15
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          DIRECT_URL: postgresql://test:test@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379
          ENCRYPTION_KEY: EVfIUORiZO0/kqfXezW9lGfDe/Sb3a/SfKVQSMX1jJo=
          JWT_SECRET: ci-placeholder-jwt-secret-32-chars-long
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
        run: npm run build
      - name: Start production server
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          DIRECT_URL: postgresql://test:test@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379
          ENCRYPTION_KEY: EVfIUORiZO0/kqfXezW9lGfDe/Sb3a/SfKVQSMX1jJo=
          JWT_SECRET: ci-placeholder-jwt-secret-32-chars-long
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          NEXT_TELEMETRY_DISABLED: 1
          NODE_ENV: production
        run: |
          npm run start > next-server.log 2>&1 &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
          sleep 3
          if ! kill -0 $SERVER_PID 2>/dev/null; then
            echo "❌ Server died immediately – dumping log"
            cat next-server.log
            exit 1
          fi
# Duplicate Build/Start block removed – original block kept above
      - name: Wait for app to be ready (port + health)
        timeout-minutes: 5
        run: |
          # Step 1: wait until port 3000 is actually listening
          npx wait-on --timeout 240000 tcp:3000
          # Step 2: confirm the health route responds with 2xx
          npx wait-on --timeout 240000 --interval 3000 --delay 5000 http-get://localhost:3000/api/health
      - name: Dump server log if healthcheck fails
        if: failure()
        run: |
          echo "===== next-server.log ====="
          cat next-server.log || true
          echo "===== Last 80 lines ====="
          tail -80 next-server.log || true
          echo "===== Port 3000 listeners ====="
          lsof -i :3000 || ss -tlnp | grep 3000 || true
      - name: Run Playwright tests
        timeout-minutes: 10
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379
        run: npx playwright test --project=chromium

  accessibility:
    runs-on: ubuntu-latest
    needs: e2e
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U test -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Push schema to CI database
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          DIRECT_URL: postgresql://test:test@localhost:5432/testdb
        run: npx prisma db push --force-reset --accept-data-loss
      - name: Start dev server
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          DIRECT_URL: postgresql://test:test@localhost:5432/testdb
          ENCRYPTION_KEY: EVfIUORiZO0/kqfXezW9lGfDe/Sb3a/SfKVQSMX1jJo=
          JWT_SECRET: ci-placeholder-jwt-secret-32-chars-long
        run: |
          npm run dev &
          npx wait-on http://localhost:3000
      - name: Run axe accessibility tests
        run: npm run test:axe

  security:
    runs-on: ubuntu-latest
    needs: accessibility
    continue-on-error: true
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U test -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Push schema to CI database
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          DIRECT_URL: postgresql://test:test@localhost:5432/testdb
        run: npx prisma db push --force-reset --accept-data-loss
      - name: Start dev server
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          DIRECT_URL: postgresql://test:test@localhost:5432/testdb
          ENCRYPTION_KEY: EVfIUORiZO0/kqfXezW9lGfDe/Sb3a/SfKVQSMX1jJo=
          JWT_SECRET: ci-placeholder-jwt-secret-32-chars-long
        run: |
          npm run dev &
          npx wait-on http://localhost:3000
      - name: Run OWASP ZAP baseline scan
        run: |
          mkdir -p ${{ github.workspace }}/zap-wrk
          chmod 777 ${{ github.workspace }}/zap-wrk
          cp ${{ github.workspace }}/zap-rules.conf ${{ github.workspace }}/zap-wrk/
          docker run --rm --network host \
            -v ${{ github.workspace }}/zap-wrk:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -I -t http://localhost:3000 -c zap-rules.conf -r zap_report.html
      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: ${{ github.workspace }}/zap-wrk/zap_report.html

  performance:
    runs-on: ubuntu-latest
    needs: security
    continue-on-error: true
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U test -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          DIRECT_URL: postgresql://test:test@localhost:5432/testdb
        run: npx prisma generate
      - name: Push schema to CI database
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          DIRECT_URL: postgresql://test:test@localhost:5432/testdb
        run: npx prisma db push --force-reset --accept-data-loss
      - name: Install k6
        run: |
          set -euo pipefail
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq && sudo apt-get install -y k6
      - name: Start dev server
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          DIRECT_URL: postgresql://test:test@localhost:5432/testdb
          ENCRYPTION_KEY: EVfIUORiZO0/kqfXezW9lGfDe/Sb3a/SfKVQSMX1jJo=
          JWT_SECRET: ci-placeholder-jwt-secret-32-chars-long
          NODE_ENV: production
        run: |
          npm run build
          npm run start &
      - name: Wait for app to be ready (DB-backed probe)
        run: npx wait-on http-get://localhost:3000/api/health --timeout 60000
      - name: Run k6 performance tests
        run: |
          k6 run ./tests/performance/home_loalatest

  publish:
    runs-on: ubuntu-latest
    needs: [security]
    if: github.ref == 'refs/heads/main'
    env:
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build production bundle
        run: npm run build
      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository }}:latest .
      - name: Push Docker image
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository }}:latest
