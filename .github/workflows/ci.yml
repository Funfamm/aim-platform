name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Use Node.js 24 runtime for GitHub Actions to avoid Node 20 deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint (baseline-aware)
        run: npm run lint:ci

  typecheck:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit

  unit:
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npx vitest run

  integration:
    runs-on: ubuntu-latest
    needs: unit
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U test -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
        run: npm run test:integration

  e2e:
    runs-on: ubuntu-latest
    needs: integration
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U test -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Push schema to CI database
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          DIRECT_URL: postgresql://test:test@localhost:5432/testdb
        run: npx prisma db push --force-reset --accept-data-loss
      - name: Start dev server
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          DIRECT_URL: postgresql://test:test@localhost:5432/testdb
          ENCRYPTION_KEY: EVfIUORiZO0/kqfXezW9lGfDe/Sb3a/SfKVQSMX1jJo=
          JWT_SECRET: ci-placeholder-jwt-secret-32-chars-long
        run: |
          npm run dev &
          npx wait-on http://localhost:3000
      - name: Run Playwright tests
        run: npx playwright test

  accessibility:
    runs-on: ubuntu-latest
    needs: e2e
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U test -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Push schema to CI database
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          DIRECT_URL: postgresql://test:test@localhost:5432/testdb
        run: npx prisma db push --force-reset --accept-data-loss
      - name: Start dev server
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          DIRECT_URL: postgresql://test:test@localhost:5432/testdb
          ENCRYPTION_KEY: EVfIUORiZO0/kqfXezW9lGfDe/Sb3a/SfKVQSMX1jJo=
          JWT_SECRET: ci-placeholder-jwt-secret-32-chars-long
        run: |
          npm run dev &
          npx wait-on http://localhost:3000
      - name: Run axe accessibility tests
        run: npm run test:axe

  security:
    runs-on: ubuntu-latest
    needs: accessibility
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U test -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Push schema to CI database
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          DIRECT_URL: postgresql://test:test@localhost:5432/testdb
        run: npx prisma db push --force-reset --accept-data-loss
      - name: Start dev server
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          DIRECT_URL: postgresql://test:test@localhost:5432/testdb
          ENCRYPTION_KEY: EVfIUORiZO0/kqfXezW9lGfDe/Sb3a/SfKVQSMX1jJo=
          JWT_SECRET: ci-placeholder-jwt-secret-32-chars-long
        run: |
          npm run dev &
          npx wait-on http://localhost:3000
      - name: Run OWASP ZAP baseline scan
        run: |
          mkdir -p ${{ github.workspace }}/zap-wrk
          chmod 777 ${{ github.workspace }}/zap-wrk
          docker run --rm --network host \
            -v ${{ github.workspace }}/zap-wrk:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://localhost:3000 -r zap_report.html
      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: ${{ github.workspace }}/zap-wrk/zap_report.html

  performance:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install k6
        run: |
          curl -s https://raw.githubusercontent.com/k6io/k6/master/install.sh | bash
      - name: Start dev server
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
        run: |
          npm run dev &
          npx wait-on http://localhost:3000
      - name: Run k6 performance tests
        run: |
          k6 run ./tests/performance/home_load.js

  publish:
    runs-on: ubuntu-latest
    needs: performance
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build production bundle
        run: npm run build
      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository }}:latest .
      - name: Push Docker image
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository }}:latest
